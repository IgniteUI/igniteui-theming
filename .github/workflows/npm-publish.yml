name: Npm.js deploy

permissions:
  id-token: write
  contents: read

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from release tag
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          if [ -z "$VERSION" ]; then
            echo "::error::Could not determine version from release tag"
            exit 1
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Publishing version: ${VERSION}"

      - name: Install dependencies
        run: npm ci

      - name: Lint package
        run: npm run lint

      - name: Build package
        run: npm run build
        env:
          MCP_VERSION: ${{ env.VERSION }}

      - name: Test package
        run: npm test

      - name: Define NPM tag
        run: |
          if [[ ${VERSION} == *"alpha"* || ${VERSION} == *"beta"* || ${VERSION} == *"rc"* ]]; then
            echo "NPM_TAG=next"
          elif [[ ${VERSION} == *"patch"* ]]; then
            echo "NPM_TAG=patch"
          else
            echo "NPM_TAG=latest"
          fi >> $GITHUB_ENV
          echo ${NPM_TAG}

      - name: Create package version
        run: npm version ${VERSION/-patch/} --no-git-tag-version --save --allow-same-version
        working-directory: packages/theming

      - name: Publish igniteui-theming
        run: npm publish --tag ${NPM_TAG} --provenance
        working-directory: packages/theming
